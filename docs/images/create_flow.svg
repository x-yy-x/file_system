<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 550 480" width="550" height="480">
  <rect width="550" height="480" fill="#FAFBFC"/>
  
<rect x="200" y="10" width="150" height="35" rx="4" fill="#E3F2FD" stroke="#1976D2" stroke-width="1.5"/>
<text x="275" y="27.5" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="13" fill="#0D47A1" font-weight="bold">create(path)</text>
<line x1="275" y1="45" x2="275" y2="70" stroke="#999" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="160" y="70" width="230" height="35" rx="4" fill="#F5F5F5" stroke="#999" stroke-width="1.5"/>
<text x="275" y="87.5" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="12" fill="#333">解析路径, 获取父目录 Inode</text>
<line x1="275" y1="105" x2="275" y2="130" stroke="#999" stroke-width="1.5" marker-end="url(#arrow)"/>

<polygon points="275,130 405,165 275,200 145,165" fill="#FFF9C4" stroke="#F9A825" stroke-width="1.5"/>
<text x="275" y="164" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">文件名合法?</text>
// No → return
<line x1="405" y1="165" x2="460" y2="165" stroke="#999" stroke-width="1.5" marker-end="url(#ar6)"/>
<text x="435" y="157" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">否</text>
<rect x="460" y="148" width="100" height="35" rx="4" fill="#FFCDD2" stroke="#E53935" stroke-width="1.5"/>
<text x="510" y="165.5" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="12" fill="#b71c1c">返回 false</text>
// Yes
<line x1="275" y1="200" x2="275" y2="230" stroke="#999" stroke-width="1.5" marker-end="url(#ar6)"/>
<text x="285" y="220" font-family="Arial" font-size="11" fill="#666">是</text>
<polygon points="275,230 405,265 275,300 145,265" fill="#FFF9C4" stroke="#F9A825" stroke-width="1.5"/>
<text x="275" y="264" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">同名文件已存在?</text>
// Yes → return
<line x1="405" y1="265" x2="460" y2="265" stroke="#999" stroke-width="1.5"/>
<text x="435" y="257" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">是</text>
<rect x="460" y="248" width="100" height="35" rx="4" fill="#FFCDD2" stroke="#E53935" stroke-width="1.5"/>
<text x="510" y="265.5" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="12" fill="#b71c1c">返回 false</text>
// No
<line x1="275" y1="300" x2="275" y2="330" stroke="#999" stroke-width="1.5" marker-end="url(#ar6)"/>
<text x="285" y="320" font-family="Arial" font-size="11" fill="#666">否</text>
<rect x="140" y="330" width="270" height="35" rx="4" fill="#C8E6C9" stroke="#388E3C" stroke-width="1.5"/>
<text x="275" y="347.5" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="12" fill="#333">allocInode() → 分配新 Inode 并初始化</text>
<line x1="275" y1="365" x2="275" y2="390" stroke="#999" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="140" y="390" width="270" height="35" rx="4" fill="#C8E6C9" stroke="#388E3C" stroke-width="1.5"/>
<text x="275" y="407.5" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="12" fill="#333">addEntry() → 父目录添加目录项</text>
<line x1="275" y1="425" x2="275" y2="445" stroke="#999" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="200" y="445" width="150" height="30" rx="4" fill="#C8E6C9" stroke="#388E3C" stroke-width="1.5"/>
<text x="275" y="460" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="13" fill="#1b5e20" font-weight="bold">返回 true</text>
<defs>
  <marker id="ar6" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#999"/></marker>
</defs>

</svg>