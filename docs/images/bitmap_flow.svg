<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 380" width="500" height="380">
  <rect width="500" height="380" fill="#FAFBFC"/>
  
<rect x="160" y="10" width="180" height="35" rx="4" fill="#E3F2FD" stroke="#1976D2" stroke-width="1.5"/>
<text x="250" y="27.5" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="13" fill="#0D47A1" font-weight="bold">allocateBlock() 开始</text>
<line x1="250" y1="45" x2="250" y2="70" stroke="#999" stroke-width="1.5" marker-end="url(#arrow)"/>

<polygon points="250,70 380,105 250,140 120,105" fill="#FFF9C4" stroke="#F9A825" stroke-width="1.5"/>
<text x="250" y="109" text-anchor="middle" font-family="Arial" font-size="13" fill="#333">扫描位图，找到</text>
<text x="250" y="124" text-anchor="middle" font-family="Arial" font-size="13" fill="#333">第一个值为 0 的位</text>
<line x1="250" y1="140" x2="250" y2="170" stroke="#999" stroke-width="1.5" marker-end="url(#arrow)"/>

<polygon points="250,170 380,205 250,240 120,205" fill="#FFF9C4" stroke="#F9A825" stroke-width="1.5"/>
<text x="250" y="209" text-anchor="middle" font-family="Arial" font-size="13" fill="#333">找到空闲块?</text>
// Yes
<line x1="380" y1="205" x2="440" y2="205" stroke="#999" stroke-width="1.5" marker-end="url(#ar5)"/>
<text x="415" y="197" text-anchor="middle" font-family="Arial" font-size="12" fill="#666">是</text>
<rect x="440" y="185" width="140" height="40" rx="4" fill="#C8E6C9" stroke="#388E3C" stroke-width="1.5"/>
<text x="510" y="205" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="12" fill="#333">标记为已分配
返回块号</text>
// No
<line x1="250" y1="240" x2="250" y2="270" stroke="#999" stroke-width="1.5" marker-end="url(#ar5)"/>
<text x="260" y="260" font-family="Arial" font-size="12" fill="#666">否</text>
<rect x="150" y="270" width="200" height="40" rx="4" fill="#FFCDD2" stroke="#E53935" stroke-width="1.5"/>
<text x="250" y="290" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="13" fill="#b71c1c" font-weight="bold">磁盘已满 - 返回 -1</text>
// free
<rect x="30" y="330" width="440" height="35" rx="4" fill="#F5F5F5" stroke="#CCC" stroke-width="1.5"/>
<text x="250" y="347.5" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="12" fill="#555">回收操作 freeBlock(): 直接清零对应比特位，时间复杂度 O(1)</text>
<defs>
  <marker id="ar5" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#999"/></marker>
</defs>

</svg>