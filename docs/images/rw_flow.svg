<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" width="600" height="500">
  <rect width="600" height="500" fill="#FAFBFC"/>
  
<rect x="230" y="10" width="140" height="35" rx="4" fill="#E3F2FD" stroke="#1976D2" stroke-width="1.5"/>
<text x="300" y="27.5" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="13" fill="#0D47A1" font-weight="bold">open(path, mode)</text>
<line x1="300" y1="45" x2="300" y2="70" stroke="#999" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="160" y="70" width="280" height="35" rx="4" fill="#F5F5F5" stroke="#999" stroke-width="1.5"/>
<text x="300" y="87.5" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="12" fill="#333">分配文件描述符 fd, 记录 Inode 编号和模式</text>
<line x1="300" y1="105" x2="300" y2="130" stroke="#999" stroke-width="1.5" marker-end="url(#arrow)"/>

// Two branches
<line x1="300" y1="130" x2="150" y2="160" stroke="#999" stroke-width="1.5" marker-end="url(#ar7)"/>
<line x1="300" y1="130" x2="450" y2="160" stroke="#999" stroke-width="1.5" marker-end="url(#ar7)"/>
<text x="150" y="150" text-anchor="middle" font-family="Arial" font-size="12" fill="#666">读操作</text>
<text x="450" y="150" text-anchor="middle" font-family="Arial" font-size="12" fill="#666">写操作</text>
<rect x="50" y="160" width="200" height="40" rx="4" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5"/>
<text x="150" y="180" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="12" fill="#333">read(fd, size)
从 offset 开始读取</text>
<rect x="350" y="160" width="200" height="40" rx="4" fill="#FFF3E0" stroke="#FF9800" stroke-width="1.5"/>
<text x="450" y="180" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="12" fill="#333">write(fd, data)
从 offset 开始写入</text>
<line x1="150" y1="200" x2="150" y2="230" stroke="#999" stroke-width="1.5" marker-end="url(#arrow)"/>

<line x1="450" y1="200" x2="450" y2="230" stroke="#999" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="50" y="230" width="200" height="35" rx="4" fill="#F5F5F5" stroke="#999" stroke-width="1.5"/>
<text x="150" y="247.5" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="12" fill="#333">逐块读取 → getBlockPointer</text>
<rect x="350" y="230" width="200" height="35" rx="4" fill="#F5F5F5" stroke="#999" stroke-width="1.5"/>
<text x="450" y="247.5" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="12" fill="#333">expandFile() 若需要则分配新块</text>
<line x1="150" y1="265" x2="150" y2="290" stroke="#999" stroke-width="1.5" marker-end="url(#arrow)"/>

<line x1="450" y1="265" x2="450" y2="290" stroke="#999" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="50" y="290" width="200" height="35" rx="4" fill="#C8E6C9" stroke="#388E3C" stroke-width="1.5"/>
<text x="150" y="307.5" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="12" fill="#333">返回字节数组</text>
<rect x="350" y="290" width="200" height="35" rx="4" fill="#C8E6C9" stroke="#388E3C" stroke-width="1.5"/>
<text x="450" y="307.5" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="12" fill="#333">写入数据, 更新 offset</text>
// Merge
<line x1="150" y1="325" x2="275" y2="360" stroke="#999" stroke-width="1.5" marker-end="url(#arrow)"/>

<line x1="450" y1="325" x2="325" y2="360" stroke="#999" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="225" y="360" width="150" height="35" rx="4" fill="#E3F2FD" stroke="#1976D2" stroke-width="1.5"/>
<text x="300" y="377.5" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="13" fill="#0D47A1" font-weight="bold">close(fd)</text>
<line x1="300" y1="395" x2="300" y2="420" stroke="#999" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="225" y="420" width="150" height="30" rx="4" fill="#C8E6C9" stroke="#388E3C" stroke-width="1.5"/>
<text x="300" y="435" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="12" fill="#1b5e20">释放文件描述符</text>
<defs>
  <marker id="ar7" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#999"/></marker>
</defs>

</svg>